version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        - env | grep -e CLERK_SECRET_KEY -e CLERK_JWT_ISSUER_DOMAIN -e CLERK_AUTHORIZED_PARTIES >> .env.production
        - env | grep -e GOOGLE_CLIENT_ID -e GOOGLE_REDIRECT_URI >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
